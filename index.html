<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> A Quick Question</title>
    <style>
      body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background-color: #fdf2f8;
  font-family: sans-serif;
  margin: 0;
  user-select: none;
}
#question {
  color: #374151;
  text-align: center;
}
.button-box {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}
button {
  padding: 12px 30px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition : 0.2s;
}
#yesButton {
 background-color: #10b981;
  color: white;
}
#noButton {
  background-color: #ef4444;
  color: white;
}
.hidden {
  display: none;
}
.flower {
  position: absolute; 
  font-size: 50px;    
  opacity: 0.8;       
  user-select: none;  
}

.top-left {
  top: 20px;
  left: 20px;
}

.top-right {
  top: 20px;
  right: 20px;
}

.bottom-left {
  bottom: 20px;
  left: 20px;
}

.bottom-right {
  bottom: 20px;
  right: 20px;
}
.gif-image {
  width: 200px;
  display: block;
  margin: 0 auto 20px auto;
  user-select: none;
}
    </style>
  </head>
  <body>
   
    <div class="container">
  <h1 id="question">Will you go out on a date with me?</h1>
 
  <div class="button-box">
    <button id="yesButton">Yes</button>
    <button id="noButton">No</button>
  </div>
  <div id="response" class="hidden">
    <h2>Awesome. I'll plan something fun!❤</h2>
  </div>
</div>
<div class="flower top-left">🌻</div>
<div class="flower top-right">🌹</div>
<div class="flower bottom-left">🌺</div>
<div class="flower bottom-right">🌸</div>
    <script>
    const noButton = document.getElementById("noButton");
    const yesButton = document.getElementById("yesButton");
    const question = document.getElementById("question");
    const response = document.getElementById("response");

    // === NEW VISUAL AID: GROWTH LOGIC DIAGRAM ===
    // [Image of growth logic diagram showing:
    // (A) Initial state with small 'Yes' (20px).
    // (B) Flowchart: 'No' click triggers size increment counter (+1).
    // (C) Formula: New Size = Initial Size + (Counter * Growth Step).
    // (D) Updated state with 'Yes' growing progressively (25px, 30px, 35px...)]

    // --- Start of New Code for Growth ---
    let noClickCount = 0; // Initialize a counter for 'No' interactions
    const initialYesSize = 20; // Set the starting font size of the 'Yes' button in pixels (you can adjust this)
    const growthPerClick = 10; // Pixels to add to the 'Yes' button each time 'No' is clicked
    // --- End of New Code for Growth ---


    function runAway(event) {
      if (event) {
        event.preventDefault(); 
      }

      // --- Start of Updated Growth Logic ---
      noClickCount++; // Increment the counter every time 'No' is clicked/hovered
      const newYesSize = initialYesSize + (noClickCount * growthPerClick);
      yesButton.style.fontSize = newYesSize + "px"; // Update the font size!
      yesButton.style.padding = (noClickCount * 2) + 15 + "px " + (noClickCount * 4) + 35 + "px"; // Also grow padding!
      // --- End of Updated Growth Logic ---


      const randomX = Math.random() * (window.innerWidth - 120);
      const randomY = Math.random() * (window.innerHeight - 60);

      noButton.style.position = "absolute";
      noButton.style.left = randomX + "px";
      noButton.style.top = randomY + "px";
    }

    noButton.addEventListener("mouseover", runAway);  
    noButton.addEventListener("touchstart", runAway); 

    yesButton.addEventListener("click", function() {
      question.classList.add("hidden");
      yesButton.classList.add("hidden");
      noButton.classList.add("hidden");
      
      response.classList.remove("hidden");
    });
  </script>
    
    
  </body>
</html>
